<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E84A8C">
<title>가짜 예술가 - 테스트</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    background: #FAF6F0;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  h1 {
    font-size: 24px;
    font-weight: 800;
    margin: 0 0 4px;
    letter-spacing: -0.5px;
  }
  h2 {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.3px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin: 0 0 20px;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    -webkit-appearance: none;
    font-family: inherit;
    transition: transform 0.05s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-secondary {
    background: white;
    color: #1a1a1a;
    border: 1px solid rgba(0,0,0,0.1);
  }
  .btn-danger { background: #E84A8C; }
  .btn:disabled { opacity: 0.3; pointer-events: none; }
  
  /* Lobby */
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    background: white;
    border-radius: 12px;
    margin-bottom: 6px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .player-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .player-name {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }
  .name-input {
    flex: 1;
    font-size: 15px;
    border: none;
    background: transparent;
    padding: 4px 0;
    font-family: inherit;
    outline: none;
    font-weight: 600;
  }
  
  /* Role reveal */
  .role-card {
    background: white;
    border-radius: 20px;
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 14px;
  }
  .big-dot {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin: 0 auto 16px;
  }
  .role-label {
    font-size: 13px;
    color: #888;
    margin: 0 0 8px;
  }
  .role-name {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 4px;
    letter-spacing: -0.5px;
  }
  .pen-color {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
  }
  .role-fake {
    background: #FFE5EE;
    color: #C0145E;
    padding: 16px;
    border-radius: 14px;
    margin: 16px 0 8px;
  }
  .role-fake .role-name { color: #C0145E; }
  .subject-box {
    background: #F0F4FF;
    border-radius: 14px;
    padding: 14px;
    margin-top: 12px;
  }
  .subject-cat {
    font-size: 12px;
    color: #4A5DD4;
    margin: 0 0 4px;
  }
  .subject-name {
    font-size: 28px;
    font-weight: 800;
    color: #2A3CD4;
    margin: 0;
    letter-spacing: -1px;
  }
  .hint-text {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin-top: 16px;
  }
  .pass-warning {
    background: #FFF8E1;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    color: #8A6500;
    text-align: center;
    margin-bottom: 12px;
  }
  
  /* Drawing screen */
  .turn-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 10px;
    color: white;
    font-weight: 700;
    font-size: 15px;
  }
  .turn-banner .turn-name { display: flex; align-items: center; gap: 8px; }
  .turn-banner .turn-progress { font-size: 13px; opacity: 0.85; font-weight: 500; }
  .canvas-wrap {
    position: relative;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }
  canvas {
    display: block;
    touch-action: none;
    width: 100%;
    height: 100%;
  }
  .canvas-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(0,0,0,0.18);
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    pointer-events: none;
  }
  .invalid-toast {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    pointer-events: none;
    animation: toast-pop 1.5s ease forwards;
  }
  @keyframes toast-pop {
    0% { opacity:0; transform: translate(-50%, 10px); }
    15% { opacity:1; transform: translate(-50%, 0); }
    85% { opacity:1; transform: translate(-50%, 0); }
    100% { opacity:0; transform: translate(-50%, -4px); }
  }
  .stroke-strip {
    display: flex;
    gap: 4px;
    padding: 0 4px;
  }
  .stroke-strip-item {
    flex: 1;
    padding: 6px 4px;
    border-radius: 8px;
    text-align: center;
    font-size: 10px;
    color: #888;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: white;
    border: 1px solid rgba(0,0,0,0.05);
  }
  .stroke-strip-item.active {
    color: white;
  }
  .stroke-strip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  
  /* Voting */
  .vote-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: white;
    border-radius: 12px;
    border: 2px solid transparent;
    margin-bottom: 6px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
  }
  .vote-row.selected { border-color: #1a1a1a; }
  
  /* Result */
  .result-banner {
    border-radius: 20px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 14px;
  }
  .result-banner.fake-won { background: #FFE5EE; color: #C0145E; }
  .result-banner.artists-won { background: #E5FFF0; color: #006B3C; }
  .result-banner.fake-hidden { background: #FFF0E5; color: #A8540F; }
  .result-title { font-size: 26px; font-weight: 800; margin: 0 0 8px; }
  .result-sub { font-size: 14px; opacity: 0.85; margin: 0; }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .label { color: #888; }
  
  /* Pass device overlay */
  .pass-overlay {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    color: white;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }
  .pass-overlay .arrow { font-size: 60px; margin-bottom: 20px; }
  .pass-overlay h2 { font-size: 28px; margin: 0 0 8px; }
  .pass-overlay p { font-size: 15px; opacity: 0.7; margin: 0 0 30px; }
  .pass-overlay button {
    background: white;
    color: #1a1a1a;
    border: none;
    padding: 16px 40px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  
  .small-canvas {
    width: 100%;
    aspect-ratio: 4/3;
    background: white;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.06);
    margin-bottom: 12px;
  }
  
  .status-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 14px;
    font-size: 12px;
    background: rgba(0,0,0,0.04);
    color: #555;
  }
  .status-pill.done { background: #E5FFF0; color: #006B3C; }
  
  input[type="text"].text-input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    font-size: 16px;
    font-family: inherit;
    background: white;
    outline: none;
    -webkit-appearance: none;
  }
  input[type="text"].text-input:focus { border-color: #1a1a1a; }
  
  .player-count-row { display: flex; gap: 8px; }
  .count-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    background: white;
    border-radius: 10px;
    font-weight: 700;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
  }
  .count-btn.active {
    background: #1a1a1a;
    color: white;
    border-color: #1a1a1a;
  }
</style>
</head>
<body>
<div id="app">
  <div id="screen" class="screen"></div>
</div>

<script>
'use strict';

const COLORS = [
  {hex:'#E84A8C', name:'분홍'},
  {hex:'#3B82F6', name:'파랑'},
  {hex:'#10B981', name:'초록'},
  {hex:'#F59E0B', name:'주황'},
  {hex:'#8B5CF6', name:'보라'},
  {hex:'#EF4444', name:'빨강'},
  {hex:'#06B6D4', name:'하늘'},
  {hex:'#84CC16', name:'연두'},
  {hex:'#EC4899', name:'자홍'},
  {hex:'#6366F1', name:'남색'}
];

// 주제 풀
const TOPIC_POOL = [
  {cat:'동물', subjects:['사자','기린','펭귄','문어','고슴도치','박쥐','코끼리','다람쥐']},
  {cat:'과일', subjects:['수박','바나나','포도','파인애플','석류','복숭아','체리','딸기']},
  {cat:'음식', subjects:['피자','햄버거','김밥','라면','초밥','떡볶이','치킨','만두']},
  {cat:'탈것', subjects:['자동차','자전거','비행기','헬리콥터','잠수함','기차','오토바이','요트']},
  {cat:'직업', subjects:['의사','요리사','경찰관','우주비행사','농부','소방관','화가','목수']},
  {cat:'운동', subjects:['축구','야구','농구','스키','양궁','펜싱','수영','테니스']},
  {cat:'악기', subjects:['피아노','기타','드럼','바이올린','하프','아코디언','트럼펫','색소폰']},
  {cat:'건물/장소', subjects:['에펠탑','피라미드','성','등대','관람차','풍차','분수대','다리']},
  {cat:'자연', subjects:['화산','무지개','폭포','섬','동굴','오로라','번개','회오리']},
  {cat:'캐릭터', subjects:['좀비','유령','외계인','인어','산타','마법사','해적','로봇']},
  {cat:'빨간 것', subjects:['토마토','소방차','딸기','장미','립스틱','우체통','고추','산타옷']},
  {cat:'둥근 것', subjects:['축구공','시계','도넛','CD','타이어','동전','반지','보름달']},
  {cat:'한국적인 것', subjects:['한복','김치','태극기','경복궁','장구','호랑이','부채','북']},
  {cat:'채소', subjects:['당근','양배추','옥수수','고추','브로콜리','가지','오이','버섯']},
  {cat:'음료', subjects:['커피','맥주','우유','칵테일','버블티','와인','녹차','콜라']},
];

const state = {
  phase: 'lobby',
  players: [],
  playerCount: 5,
  questionMaster: null,
  fakeArtist: null,
  category: '',
  subject: '',
  topicCategory: '',
  rolesViewedQueue: [],
  rolesViewedIndex: 0,
  rolesViewedShown: false,
  currentTurnPlayer: null,
  turnIndex: 0,
  maxTurns: 0,
  strokes: [],
  liveStroke: null,
  passingTo: null,
  passingNextPhase: null,
  invalidToastTime: 0,
  accusedId: null,
  votes: {},
  voterQueue: [],
  voterIndex: 0,
  votingShown: false,
  fakeGuess: '',
  outcome: null,
  scores: {}
};

const root = document.getElementById('screen');

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === 'style') e.style.cssText = attrs[k];
      else if (k === 'class') e.className = attrs[k];
      else if (k === 'onclick') e.onclick = attrs[k];
      else if (k === 'oninput') e.oninput = attrs[k];
      else if (k === 'onkeydown') e.onkeydown = attrs[k];
      else if (k.startsWith('data-')) e.setAttribute(k, attrs[k]);
      else e[k] = attrs[k];
    }
  }
  if (children != null) {
    if (typeof children === 'string') e.innerHTML = children;
    else if (Array.isArray(children)) children.forEach(c => c && e.appendChild(c));
    else e.appendChild(children);
  }
  return e;
}

function render() {
  root.innerHTML = '';
  document.querySelectorAll('.pass-overlay').forEach(o => o.remove());
  
  if (state.passingTo != null) return renderPassOverlay();
  
  switch (state.phase) {
    case 'lobby': return renderLobby();
    case 'role-reveal': return renderRoleReveal();
    case 'drawing': return renderDrawing();
    case 'voting': return renderVoting();
    case 'guess': return renderGuess();
    case 'result': return renderResult();
  }
}

// ====== LOBBY ======
function renderLobby() {
  root.appendChild(el('div', null, [
    el('h1', null, '가짜 예술가'),
    el('p', {class:'subtitle'}, '한 폰을 돌려가며 플레이하는 테스트 버전'),
  ]));
  
  // Player count selector
  root.appendChild(el('p', {style:'font-size:13px;color:#666;margin:4px 0 8px;font-weight:600;'}, '인원 수'));
  const countRow = el('div', {class:'player-count-row'});
  [4,5,6,7,8].forEach(n => {
    const b = el('button', {
      class: 'count-btn' + (state.playerCount===n ? ' active':''),
      onclick: () => { state.playerCount = n; ensurePlayers(); render(); }
    }, n + '명');
    countRow.appendChild(b);
  });
  root.appendChild(countRow);
  
  // Player list with editable names
  ensurePlayers();
  root.appendChild(el('p', {style:'font-size:13px;color:#666;margin:18px 0 8px;font-weight:600;'}, '플레이어 이름 (탭해서 수정)'));
  
  state.players.forEach((p, i) => {
    const row = el('div', {class:'player-row'});
    row.appendChild(el('div', {class:'player-dot', style:`background:${p.color.hex};`}));
    
    const nameInput = el('input', {
      class:'name-input',
      type:'text',
      value:p.name,
      maxLength:8,
      oninput: (ev) => { p.name = ev.target.value || ('P' + (i+1)); }
    });
    row.appendChild(nameInput);
    row.appendChild(el('span', {style:'font-size:12px;color:#999;'}, p.color.name));
    root.appendChild(row);
  });
  
  // Settings note
  root.appendChild(el('div', {class:'card', style:'margin-top:14px;background:#FFF8E1;border-color:transparent;'}, [
    el('p', {style:'font-size:13px;color:#8A6500;margin:0;line-height:1.6;'}, 
      '<b>테스트 포인트</b><br>• 손가락 그리기 감 확인<br>• 펜 떼면 자동 다음 사람으로<br>• 점만 찍으면 무효 (10px 이상 이동 필요)<br>• 캔버스 너무 작거나 큰지'
    )
  ]));
  
  root.appendChild(el('button', {class:'btn', onclick: startGame}, '게임 시작'));
}

function ensurePlayers() {
  // adjust player list to match count
  const target = state.playerCount;
  while (state.players.length < target) {
    const i = state.players.length;
    state.players.push({
      id: i,
      name: '플레이어' + (i+1),
      color: COLORS[i]
    });
  }
  while (state.players.length > target) {
    state.players.pop();
  }
}

function startGame() {
  // Assign roles
  state.questionMaster = Math.floor(Math.random() * state.players.length);
  do {
    state.fakeArtist = Math.floor(Math.random() * state.players.length);
  } while (state.fakeArtist === state.questionMaster);
  
  // Pick topic
  const topicCat = TOPIC_POOL[Math.floor(Math.random() * TOPIC_POOL.length)];
  state.category = topicCat.cat;
  state.subject = topicCat.subjects[Math.floor(Math.random() * topicCat.subjects.length)];
  
  // Max turns: 2 rounds × (players - 1)
  state.maxTurns = 2 * (state.players.length - 1);
  
  // Build reveal queue - QM first, then others
  state.rolesViewedQueue = [state.questionMaster];
  for (let i=0; i<state.players.length; i++) {
    if (i !== state.questionMaster) state.rolesViewedQueue.push(i);
  }
  state.rolesViewedIndex = 0;
  state.rolesViewedShown = false;
  state.strokes = [];
  state.liveStroke = null;
  state.phase = 'role-reveal';
  
  // First pass overlay
  passDeviceTo(state.rolesViewedQueue[0], 'role-reveal');
}

// ====== PASS DEVICE OVERLAY ======
function passDeviceTo(playerIdx, nextPhase) {
  state.passingTo = playerIdx;
  state.passingNextPhase = nextPhase;
  render();
}

function renderPassOverlay() {
  const p = state.players[state.passingTo];
  const overlay = el('div', {class:'pass-overlay'});
  overlay.appendChild(el('div', {class:'arrow'}, '👉'));
  overlay.appendChild(el('p', null, '다음 차례'));
  overlay.appendChild(el('h2', null, p.name));
  overlay.appendChild(el('div', {style:`width:50px;height:50px;border-radius:50%;background:${p.color.hex};margin:14px 0 24px;`}));
  overlay.appendChild(el('p', null, '다른 사람이 보지 못하게<br>폰을 받은 뒤 시작하세요'));
  overlay.appendChild(el('button', {
    onclick: () => {
      state.passingTo = null;
      // The phase was set before, just render
      render();
    }
  }, '받았어요'));
  document.body.appendChild(overlay);
}

// ====== ROLE REVEAL ======
function renderRoleReveal() {
  const playerIdx = state.rolesViewedQueue[state.rolesViewedIndex];
  const player = state.players[playerIdx];
  const isQM = playerIdx === state.questionMaster;
  const isFake = playerIdx === state.fakeArtist;
  
  root.appendChild(el('div', null, [
    el('h2', null, '내 역할 확인'),
    el('p', {class:'subtitle'}, '다른 사람이 보지 못하게 가린 뒤 탭하세요')
  ]));
  
  if (!state.rolesViewedShown) {
    const card = el('div', {class:'role-card'});
    card.appendChild(el('div', {class:'big-dot', style:`background:${player.color.hex};`}));
    card.appendChild(el('p', {class:'role-label'}, '이름'));
    card.appendChild(el('p', {style:'font-size:22px;font-weight:700;margin:0;'}, player.name));
    card.appendChild(el('p', {class:'pen-color'}, '내 펜 색: ' + player.color.name));
    root.appendChild(card);
    root.appendChild(el('button', {class:'btn', onclick: () => {
      state.rolesViewedShown = true;
      render();
    }}, '역할 보기'));
    return;
  }
  
  // Role shown
  if (isQM) {
    const card = el('div', {class:'role-card'});
    card.appendChild(el('p', {class:'role-label'}, '당신은'));
    card.appendChild(el('p', {class:'role-name'}, '출제자'));
    const sb = el('div', {class:'subject-box'});
    sb.appendChild(el('p', {class:'subject-cat'}, '범주: ' + state.category));
    sb.appendChild(el('p', {class:'subject-name'}, state.subject));
    card.appendChild(sb);
    card.appendChild(el('p', {class:'hint-text'}, 
      `가짜 예술가: <b>${state.players[state.fakeArtist].name}</b><br>
       당신은 그림에 참여하지 않아요`
    ));
    root.appendChild(card);
  } else if (isFake) {
    const card = el('div', {class:'role-card'});
    card.appendChild(el('p', {class:'role-label'}, '당신은'));
    card.appendChild(el('div', {class:'role-fake'}, [
      el('p', {class:'role-name'}, '가짜 예술가')
    ]));
    card.appendChild(el('div', {class:'subject-box', style:'background:#FFF8E1;'}, [
      el('p', {class:'subject-cat', style:'color:#8A6500;'}, '범주만 알아요'),
      el('p', {style:'font-size:22px;font-weight:800;color:#8A6500;margin:0;'}, state.category)
    ]));
    card.appendChild(el('p', {class:'hint-text'}, 
      '주제는 모르는 상태에서 분위기에 맞춰 그리세요<br>지목당하지 않거나, 주제를 맞히면 승리!'
    ));
    root.appendChild(card);
  } else {
    const card = el('div', {class:'role-card'});
    card.appendChild(el('p', {class:'role-label'}, '당신은'));
    card.appendChild(el('p', {class:'role-name'}, '예술가'));
    const sb = el('div', {class:'subject-box'});
    sb.appendChild(el('p', {class:'subject-cat'}, '범주: ' + state.category));
    sb.appendChild(el('p', {class:'subject-name'}, state.subject));
    card.appendChild(sb);
    card.appendChild(el('p', {class:'hint-text'}, 
      '주제에 맞게 그리되, 가짜에게 힌트가 너무 명확하지 않게 추상적으로!'
    ));
    root.appendChild(card);
  }
  
  // Status pills
  const pills = el('div', {class:'status-pills'});
  state.players.forEach((p, i) => {
    const idxInQueue = state.rolesViewedQueue.indexOf(i);
    const seen = idxInQueue >= 0 && idxInQueue < state.rolesViewedIndex || 
                  (idxInQueue === state.rolesViewedIndex && state.rolesViewedShown);
    const pill = el('div', {class:'status-pill' + (seen ? ' done' : '')});
    pill.appendChild(el('span', {style:`width:8px;height:8px;border-radius:50%;background:${p.color.hex};display:inline-block;`}));
    pill.appendChild(document.createTextNode(p.name + (seen ? ' ✓' : '')));
    pills.appendChild(pill);
  });
  root.appendChild(pills);
  
  const isLast = state.rolesViewedIndex >= state.rolesViewedQueue.length - 1;
  
  root.appendChild(el('button', {class:'btn', onclick: () => {
    state.rolesViewedShown = false;
    if (isLast) {
      // Move to drawing
      // First drawer: next person after QM (skipping QM)
      state.currentTurnPlayer = nextArtist(-1);
      state.turnIndex = 0;
      state.phase = 'drawing';
      passDeviceTo(state.currentTurnPlayer, 'drawing');
    } else {
      state.rolesViewedIndex++;
      passDeviceTo(state.rolesViewedQueue[state.rolesViewedIndex], 'role-reveal');
    }
  }}, isLast ? '모두 확인 완료 - 그리기 시작' : '확인 완료 - 다음 사람에게'));
}

function nextArtist(curr) {
  let n = (curr + 1) % state.players.length;
  while (n === state.questionMaster) n = (n + 1) % state.players.length;
  return n;
}

// ====== DRAWING ======
let canvasEl = null;
let canvasCtx = null;

function renderDrawing() {
  const me = state.players[state.currentTurnPlayer];
  
  // Top banner
  const banner = el('div', {class:'turn-banner', style:`background:${me.color.hex};`});
  banner.appendChild(el('div', {class:'turn-name'}, [
    el('span', null, me.name + ' 차례')
  ]));
  banner.appendChild(el('span', {class:'turn-progress'}, 
    (state.turnIndex+1) + ' / ' + state.maxTurns + '획'
  ));
  root.appendChild(banner);
  
  // Stroke strip
  const strip = el('div', {class:'stroke-strip'});
  state.players.forEach((p, i) => {
    if (i === state.questionMaster) return;
    const count = state.strokes.filter(s => s.playerId === i).length;
    const isActive = i === state.currentTurnPlayer;
    const item = el('div', {
      class: 'stroke-strip-item' + (isActive ? ' active' : ''),
      style: isActive ? `background:${p.color.hex};` : ''
    });
    item.appendChild(el('div', {class:'stroke-strip-dot', style:`background:${p.color.hex};`}));
    item.appendChild(el('span', null, p.name));
    item.appendChild(el('span', {style:'opacity:0.6;'}, count + '/2'));
    strip.appendChild(item);
  });
  
  // Canvas wrap
  const wrap = el('div', {class:'canvas-wrap'});
  
  canvasEl = document.createElement('canvas');
  wrap.appendChild(canvasEl);
  
  // Empty canvas hint
  if (state.strokes.length === 0 && !state.liveStroke) {
    wrap.appendChild(el('div', {class:'canvas-hint'}, '한 번에 한 획만<br>펜을 떼면 다음 사람으로'));
  }
  
  root.appendChild(wrap);
  root.appendChild(strip);
  
  // Setup canvas after DOM
  requestAnimationFrame(() => {
    if (!canvasEl) return;
    setupCanvas(me);
  });
}

function setupCanvas(me) {
  const wrap = canvasEl.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  
  // Fit canvas to wrap (subtract small padding)
  const w = rect.width;
  const h = rect.height;
  
  canvasEl.style.width = w + 'px';
  canvasEl.style.height = h + 'px';
  canvasEl.width = w * dpr;
  canvasEl.height = h * dpr;
  
  canvasCtx = canvasEl.getContext('2d');
  canvasCtx.scale(dpr, dpr);
  
  redrawCanvas(w, h);
  
  let strokeDone = false;
  let currentStroke = null;
  
  function getPos(e) {
    const r = canvasEl.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    // Store normalized coords (0-1) for resilience
    return {
      x: (cx - r.left) / r.width,
      y: (cy - r.top) / r.height
    };
  }
  
  function distance(a, b) {
    const dx = (a.x - b.x) * w;
    const dy = (a.y - b.y) * h;
    return Math.sqrt(dx*dx + dy*dy);
  }
  
  function pathLength(points) {
    let total = 0;
    for (let i = 1; i < points.length; i++) {
      total += distance(points[i-1], points[i]);
    }
    return total;
  }
  
  function start(e) {
    e.preventDefault();
    if (strokeDone) return;
    const p = getPos(e);
    currentStroke = {
      color: me.color.hex,
      playerId: state.currentTurnPlayer,
      points: [p]
    };
    state.liveStroke = currentStroke;
    redrawCanvas(w, h);
  }
  
  function move(e) {
    e.preventDefault();
    if (!currentStroke || strokeDone) return;
    const p = getPos(e);
    const last = currentStroke.points[currentStroke.points.length-1];
    if (distance(last, p) < 0.3) return; // throttle
    currentStroke.points.push(p);
    redrawCanvas(w, h);
  }
  
  function end(e) {
    e.preventDefault();
    if (!currentStroke || strokeDone) return;
    
    const totalLen = pathLength(currentStroke.points);
    const firstToLast = currentStroke.points.length > 1 ? 
      distance(currentStroke.points[0], currentStroke.points[currentStroke.points.length-1]) : 0;
    
    const valid = totalLen >= 10 || firstToLast >= 10;
    
    if (!valid) {
      state.liveStroke = null;
      currentStroke = null;
      // Show toast
      const toast = el('div', {class:'invalid-toast'}, '점만 찍으면 무효 — 선을 그어주세요');
      canvasEl.parentElement.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
      redrawCanvas(w, h);
      return;
    }
    
    strokeDone = true;
    state.strokes.push(currentStroke);
    state.liveStroke = null;
    redrawCanvas(w, h);
    currentStroke = null;
    
    // Advance after delay (so player sees final stroke briefly)
    setTimeout(() => {
      state.turnIndex++;
      if (state.turnIndex >= state.maxTurns) {
        // Move to voting
        startVoting();
      } else {
        state.currentTurnPlayer = nextArtist(state.currentTurnPlayer);
        passDeviceTo(state.currentTurnPlayer, 'drawing');
      }
    }, 700);
  }
  
  canvasEl.addEventListener('touchstart', start, {passive:false});
  canvasEl.addEventListener('touchmove', move, {passive:false});
  canvasEl.addEventListener('touchend', end);
  canvasEl.addEventListener('touchcancel', end);
  canvasEl.addEventListener('mousedown', start);
  canvasEl.addEventListener('mousemove', move);
  canvasEl.addEventListener('mouseup', end);
  canvasEl.addEventListener('mouseleave', end);
}

function redrawCanvas(w, h) {
  if (!canvasCtx) return;
  canvasCtx.clearRect(0, 0, w, h);
  state.strokes.forEach(s => drawStroke(s, w, h));
  if (state.liveStroke) drawStroke(state.liveStroke, w, h);
}

function drawStroke(stroke, w, h) {
  if (stroke.points.length === 0) return;
  canvasCtx.strokeStyle = stroke.color;
  canvasCtx.lineWidth = 3.5;
  canvasCtx.lineCap = 'round';
  canvasCtx.lineJoin = 'round';
  canvasCtx.beginPath();
  stroke.points.forEach((p, i) => {
    const x = p.x * w, y = p.y * h;
    if (i === 0) canvasCtx.moveTo(x, y);
    else canvasCtx.lineTo(x, y);
  });
  canvasCtx.stroke();
}

// ====== VOTING ======
function startVoting() {
  state.voterQueue = state.players
    .map((_, i) => i)
    .filter(i => i !== state.questionMaster);
  state.voterIndex = 0;
  state.votes = {};
  state.votingShown = false;
  state.phase = 'voting';
  passDeviceTo(state.voterQueue[0], 'voting');
}

function renderVoting() {
  const voterIdx = state.voterQueue[state.voterIndex];
  const voter = state.players[voterIdx];
  
  root.appendChild(el('div', null, [
    el('h2', null, '가짜 예술가 지목'),
    el('p', {class:'subtitle'}, voter.name + ', 누가 가짜라고 생각하나요?')
  ]));
  
  // Mini canvas
  const miniWrap = el('div', null);
  const miniCanvas = document.createElement('canvas');
  miniCanvas.className = 'small-canvas';
  miniWrap.appendChild(miniCanvas);
  root.appendChild(miniWrap);
  
  requestAnimationFrame(() => {
    const r = miniCanvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    miniCanvas.width = r.width * dpr;
    miniCanvas.height = r.height * dpr;
    const ctx = miniCanvas.getContext('2d');
    ctx.scale(dpr, dpr);
    state.strokes.forEach(s => {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      s.points.forEach((p, i) => {
        const x = p.x * r.width, y = p.y * r.height;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    });
  });
  
  // Vote rows
  state.players.forEach((p, i) => {
    if (i === voterIdx || i === state.questionMaster) return;
    const selected = state.votes[voterIdx] === i;
    const row = el('button', {
      class: 'vote-row' + (selected ? ' selected' : ''),
      onclick: () => {
        state.votes[voterIdx] = i;
        render();
      }
    });
    row.appendChild(el('div', {class:'player-dot', style:`background:${p.color.hex};`}));
    row.appendChild(el('span', null, p.name));
    if (selected) {
      row.appendChild(el('span', {style:'margin-left:auto;font-size:20px;'}, '✓'));
    }
    root.appendChild(row);
  });
  
  if (state.votes[voterIdx] != null) {
    const isLast = state.voterIndex >= state.voterQueue.length - 1;
    root.appendChild(el('button', {class:'btn', onclick: () => {
      if (isLast) {
        tallyAndProceed();
      } else {
        state.voterIndex++;
        passDeviceTo(state.voterQueue[state.voterIndex], 'voting');
      }
    }}, isLast ? '결과 보기' : '확인 - 다음 사람'));
  }
}

function tallyAndProceed() {
  const tally = {};
  Object.values(state.votes).forEach(v => {
    tally[v] = (tally[v] || 0) + 1;
  });
  let maxVotes = 0, accused = null;
  let tied = false;
  Object.entries(tally).forEach(([k, v]) => {
    if (v > maxVotes) {
      maxVotes = v;
      accused = parseInt(k);
      tied = false;
    } else if (v === maxVotes) {
      tied = true;
    }
  });
  
  state.accusedId = accused;
  
  if (accused === state.fakeArtist && !tied) {
    // Fake caught - fake gets to guess
    state.phase = 'guess';
    passDeviceTo(state.fakeArtist, 'guess');
  } else {
    // Wrong vote or tie - fake + QM win
    state.outcome = 'fake_hidden';
    state.phase = 'result';
    render();
  }
}

// ====== GUESS ======
function renderGuess() {
  const fake = state.players[state.fakeArtist];
  
  root.appendChild(el('div', null, [
    el('h2', null, '가짜의 마지막 기회'),
    el('p', {class:'subtitle'}, fake.name + ', 주제를 맞히면 가짜의 승리!')
  ]));
  
  root.appendChild(el('div', {class:'card', style:'background:#FFF0E5;border-color:transparent;text-align:center;padding:20px;'}, [
    el('p', {style:'font-size:13px;color:#A8540F;margin:0 0 8px;'}, '지목당했어요'),
    el('p', {style:'font-size:22px;font-weight:800;margin:0 0 4px;color:#A8540F;'}, '진짜 가짜였습니다'),
    el('p', {style:'font-size:13px;color:#A8540F;margin:0;'}, '범주: ' + state.category)
  ]));
  
  let guess = '';
  const input = el('input', {
    class: 'text-input',
    type: 'text',
    placeholder: '주제 추측해서 입력',
    oninput: (ev) => { guess = ev.target.value.trim(); }
  });
  root.appendChild(input);
  
  root.appendChild(el('button', {class:'btn', onclick: () => {
    state.fakeGuess = guess || '(빈칸)';
    state.outcome = (guess === state.subject) ? 'fake_won' : 'artists_won';
    state.phase = 'result';
    state.passingTo = null;
    render();
  }}, '정답 제출'));
  
  setTimeout(() => input.focus(), 100);
}

// ====== RESULT ======
function renderResult() {
  const banner = el('div', {class: 'result-banner ' + state.outcome.replace('_','-')});
  
  if (state.outcome === 'fake_hidden') {
    banner.appendChild(el('p', {class:'result-title'}, '가짜 + 출제자 승리'));
    banner.appendChild(el('p', {class:'result-sub'}, '예술가들이 가짜를 못 찾았어요'));
  } else if (state.outcome === 'fake_won') {
    banner.appendChild(el('p', {class:'result-title'}, '가짜 예술가 승리'));
    banner.appendChild(el('p', {class:'result-sub'}, '지목당했지만 주제를 맞췄어요'));
  } else {
    banner.appendChild(el('p', {class:'result-title'}, '예술가들 승리'));
    banner.appendChild(el('p', {class:'result-sub'}, '가짜를 찾았고 주제도 못 맞췄어요'));
  }
  root.appendChild(banner);
  
  // Mini canvas
  const miniCanvas = document.createElement('canvas');
  miniCanvas.className = 'small-canvas';
  root.appendChild(miniCanvas);
  
  requestAnimationFrame(() => {
    const r = miniCanvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    miniCanvas.width = r.width * dpr;
    miniCanvas.height = r.height * dpr;
    const ctx = miniCanvas.getContext('2d');
    ctx.scale(dpr, dpr);
    state.strokes.forEach(s => {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      s.points.forEach((p, i) => {
        const x = p.x * r.width, y = p.y * r.height;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    });
  });
  
  const fake = state.players[state.fakeArtist];
  const qm = state.players[state.questionMaster];
  
  const card = el('div', {class:'card'});
  card.appendChild(el('div', {class:'result-row'}, [
    el('span', {class:'label'}, '정답'),
    el('span', null, state.category + ' · ' + state.subject)
  ]));
  card.appendChild(el('div', {class:'result-row'}, [
    el('span', {class:'label'}, '가짜 예술가'),
    el('span', {style:`display:inline-flex;align-items:center;gap:6px;`}, [
      el('span', {style:`width:10px;height:10px;border-radius:50%;background:${fake.color.hex};display:inline-block;`}),
      el('span', null, fake.name)
    ])
  ]));
  card.appendChild(el('div', {class:'result-row'}, [
    el('span', {class:'label'}, '출제자'),
    el('span', {style:`display:inline-flex;align-items:center;gap:6px;`}, [
      el('span', {style:`width:10px;height:10px;border-radius:50%;background:${qm.color.hex};display:inline-block;`}),
      el('span', null, qm.name)
    ])
  ]));
  if (state.fakeGuess) {
    card.appendChild(el('div', {class:'result-row'}, [
      el('span', {class:'label'}, '가짜의 추측'),
      el('span', null, state.fakeGuess)
    ]));
  }
  root.appendChild(card);
  
  root.appendChild(el('button', {class:'btn', onclick: () => {
    // Keep players, reset game
    state.phase = 'lobby';
    state.strokes = [];
    state.liveStroke = null;
    state.votes = {};
    state.outcome = null;
    state.fakeGuess = '';
    state.accusedId = null;
    render();
  }}, '새 게임'));
  
  root.appendChild(el('button', {class:'btn btn-secondary', onclick: () => {
    // Full reset
    state.phase = 'lobby';
    state.players = [];
    ensurePlayers();
    state.strokes = [];
    state.liveStroke = null;
    state.votes = {};
    state.outcome = null;
    state.fakeGuess = '';
    render();
  }}, '플레이어 다시 설정'));
}

// ====== INIT ======
ensurePlayers();
render();

// Prevent pull-to-refresh
document.body.addEventListener('touchmove', (e) => {
  if (e.target.closest('canvas') || e.target.closest('.screen')) return;
  e.preventDefault();
}, {passive: false});

// Prevent double-tap zoom
let lastTouch = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouch < 300) e.preventDefault();
  lastTouch = now;
}, {passive: false});

</script>
</body>
